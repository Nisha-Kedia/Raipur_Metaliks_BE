spring.application.name=Raipur-Metaliks

# Automatically use the 'dev' profile if no profile is specified
spring.profiles.active=dev

# Common settings or defaults can go here...
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.enable=true